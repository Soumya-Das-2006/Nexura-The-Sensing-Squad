{% extends "base.html" %}
{% block title %}404 — Page Not Found | Nexura{% endblock %}
{% block content %}
<div class="container-fluid py-5 text-center" style="min-height: 60vh; display: flex; align-items: center;">
    <div class="container">
        <div class="wow fadeInUp">
            <div class="display-1 fw-black text-primary mb-3">404</div>
            <h2 class="fw-bold mb-3">Page Not Found</h2>
            <p class="text-muted fs-5 mb-4">
                The page you're looking for doesn't exist or has been moved.<br>
                If you were looking for your dashboard, please log in.
            </p>
            <div class="d-flex flex-wrap gap-3 justify-content-center">
                <a href="{% url 'core:home' %}" class="btn btn-primary rounded-pill py-3 px-5">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
                <a href="{% url 'core:contact' %}" class="btn btn-outline-primary rounded-pill py-3 px-5">
                    Contact Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

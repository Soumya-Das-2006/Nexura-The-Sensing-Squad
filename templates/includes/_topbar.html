{% load static %}
<!-- ── Topbar ── -->
<div class="container-fluid topbar px-0 px-lg-4 bg-light py-2 d-none d-lg-block">
    <div class="container">
        <div class="row gx-0 align-items-center">

            <!-- Left: contact info -->
            <div class="col-lg-8 text-center text-lg-start mb-lg-0">
                <div class="d-flex flex-wrap gap-1">
                    <div class="border-end border-primary pe-3">
                        <span class="text-muted small">
                            <i class="fas fa-map-marker-alt text-primary me-2"></i>
                            India — Mumbai, Delhi, Bangalore, Chennai, Hyderabad, Kolkata, Pune
                        </span>
                    </div>
                    <div class="ps-3">
                        <a href="mailto:support@nexaura.in" class="text-muted small">
                            <i class="fas fa-envelope text-primary me-2"></i>support@nexaura.in
                        </a>
                    </div>
                </div>
            </div>

            <!-- Right: socials + language -->
            <div class="col-lg-4 text-center text-lg-end">
                <div class="d-flex justify-content-end align-items-center">

                    <!-- Social icons -->
                    <div class="d-flex border-end border-primary pe-3">
                        <a class="btn p-0 text-primary me-3" href="{{ nexura.social.facebook }}" target="_blank" rel="noopener" aria-label="Facebook">
                            <i class="fab fa-facebook-f"></i>
                        </a>
                        <a class="btn p-0 text-primary me-3" href="{{ nexura.social.twitter }}" target="_blank" rel="noopener" aria-label="Twitter">
                            <i class="fab fa-twitter"></i>
                        </a>
                        <a class="btn p-0 text-primary me-3" href="{{ nexura.social.instagram }}" target="_blank" rel="noopener" aria-label="Instagram">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a class="btn p-0 text-primary me-0" href="{{ nexura.social.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">
                            <i class="fab fa-linkedin-in"></i>
                        </a>
                    </div>

                    <!-- ── Language Selector ──────────────────────────────── -->

                    <!-- Desktop: Custom glassmorphism dropdown -->
                    <div class="tl-desktop-switcher ms-3">
                        <button id="tl-desktop-trigger"
                                class="tl-desktop-trigger"
                                type="button"
                                aria-haspopup="listbox"
                                aria-expanded="false"
                                aria-label="Select language"
                                aria-controls="tl-desktop-menu">
                            <i class="fas fa-globe tl-globe" aria-hidden="true"></i>
                            <span id="tl-trigger-label">🇬🇧 English</span>
                            <i class="bi bi-chevron-down tl-caret" aria-hidden="true"></i>
                        </button>

                        <div id="tl-desktop-menu"
                             class="tl-desktop-menu"
                             role="listbox"
                             aria-label="Available languages">
                            <div class="tl-menu-header">🌐 Select Language</div>
                            <div class="tl-menu-scroll">
                                {# Populated by translator.js at runtime #}
                            </div>
                            <div class="tl-menu-footer">
                                <button id="tts-toggle-desktop"
                                        class="tl-tts-btn"
                                        type="button"
                                        aria-label="Read page aloud">
                                    <i class="bi bi-volume-up-fill"></i>
                                    <span>Read Aloud</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Mobile: Globe trigger (opens bottom sheet) -->
                    <div class="tl-topbar-mobile-wrap ms-2">
                        <button id="mobile-language-trigger"
                                class="tl-mobile-trigger"
                                type="button"
                                aria-haspopup="dialog"
                                aria-label="Select language">
                            <i class="fas fa-globe" aria-hidden="true"></i>
                            <span id="tl-mobile-trigger-label">🇬🇧</span>
                        </button>
                    </div>

                    <!-- Auth quick links -->
                    <div class="ms-3 d-flex gap-2 align-items-center">
                        {% if user.is_authenticated %}
                            <span class="text-muted small">
                                <i class="fas fa-user-circle text-primary me-1"></i>
                                {{ user.mobile }}
                            </span>
                        {% else %}
                            <a href="{% url 'accounts:login' %}" class="text-muted small">
                                <i class="fas fa-sign-in-alt text-primary me-1"></i>Login
                            </a>
                        {% endif %}
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
<!-- ── Topbar End ── -->
